<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.:: Lestello Perú ::.</title>

    <link rel="shortcut icon" href="assets/img/Logo_lestello.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lestelloGold: '#bfa15f',
                        lestelloDarkGreen: '#1b4332'
                    }
                }
            }
        }
    </script>

    <style>
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("assets/img/fondo.png") center center / cover no-repeat;
            filter: blur(3px);
            transform: scale(1.08);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, .28);
            z-index: -1;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .float {
            animation: float 6s ease-in-out infinite;
        }
    </style>

</head>

<body class="min-h-screen flex flex-col items-center justify-between p-5 overflow-x-hidden font-sans">
    <!-- Contenido -->
    <main
        class="w-full max-w-md my-auto rounded-[40px] border border-white/60 bg-white/55 backdrop-blur-2xl shadow-2xl p-8">
        <!-- Logo -->
        <div class="flex justify-center mb-5">
            <img src="assets/img/Logo_lestello.png" class="w-52 float transition duration-300 hover:scale-105"
                alt="Lestello">
        </div>
        <!-- Texto -->
        <div class="text-center mb-8">
            <h1 class="uppercase tracking-[4px] text-stone-700 font-bold">
                @Lestello_pe
            </h1>
            <p class="text-sm text-stone-600 mt-2 flex justify-center items-center gap-2">
                <i class="fas fa-location-dot text-emerald-700"></i>
                Lima - Perú 🇵🇪
            </p>
            <div class="mt-5 bg-white/60 rounded-2xl p-4 border border-white shadow">
                <p class="italic text-stone-700">
                    ¡Buenos granos naturales!
                    <br>
                    Hecho en Polonia con amor 💚🌾
                </p>
            </div>
        </div>

        <!-- Botones -->
        <div class="space-y-4">

            <!-- WhatsApp -->
            <a href="https://wa.me/51938324491?text=Hola%20Lestello%2C%20quiero%20realizar%20una%20compra..."
                target="_blank"
                class="group flex items-center rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-4 shadow-lg transition-all duration-300">
                <i class="fab fa-whatsapp text-2xl w-8 text-center"></i>
                <span class="flex-1 text-center font-semibold tracking-wide">
                    Compra vía WhatsApp
                </span>
                <i class="fas fa-chevron-right w-8 text-right group-hover:translate-x-1 transition-transform"></i>
            </a>

            <!-- Catálogo -->
            <a href="assets/documents/catalogo.pdf" target="_blank"
                class="group flex items-center rounded-2xl bg-white/80 hover:bg-white px-6 py-4 border border-stone-200 shadow transition-all duration-300">
                <i class="fas fa-file-pdf text-red-600 text-xl w-8 text-center"></i>

                <span class="flex-1 text-center font-semibold tracking-wide">
                    Catálogo
                </span>

                <i class="fas fa-chevron-right w-8 text-right group-hover:translate-x-1 transition-transform"></i>

            </a>

            <!-- Página Web -->
            <a href="https://lestello.pl/" target="_blank"
                class="group flex items-center rounded-2xl bg-white/80 hover:bg-white px-6 py-4 border border-stone-200 shadow transition-all duration-300">

                <i class="fas fa-globe text-amber-700 text-xl w-8 text-center"></i>

                <span class="flex-1 text-center font-semibold tracking-wide">
                    Página Web
                </span>

                <i class="fas fa-chevron-right w-8 text-right group-hover:translate-x-1 transition-transform"></i>

            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/lestello_pe" target="_blank"
                class="group flex items-center rounded-2xl bg-white/80 hover:bg-white px-6 py-4 border border-stone-200 shadow transition-all duration-300">

                <i class="fab fa-instagram text-pink-600 text-xl w-8 text-center"></i>

                <span class="flex-1 text-center font-semibold tracking-wide">
                    Instagram
                </span>

                <i class="fas fa-chevron-right w-8 text-right group-hover:translate-x-1 transition-transform"></i>

            </a>

            <!-- Encuéntranos -->
            <a href="encuentranos.html"
                class="group flex items-center rounded-2xl bg-white/80 hover:bg-white px-6 py-4 border border-stone-200 shadow transition-all duration-300">

                <i class="fas fa-map-location-dot text-blue-600 text-xl w-8 text-center"></i>

                <span class="flex-1 text-center font-semibold tracking-wide">
                    Encuéntranos
                </span>

                <i class="fas fa-chevron-right w-8 text-right group-hover:translate-x-1 transition-transform"></i>

            </a>

        </div>
    </main>

    <footer class="text-xs text-white font-medium py-5 drop-shadow">
        &copy; 2026 Lestello Perú · Todos los derechos reservados
    </footer>

</body>

</html>
